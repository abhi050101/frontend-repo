<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code</title>
</head>
<body style="background-color: #212121; color: #fff">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function appendLanguage(language) {
        const liItem = document.createElement('li')
        liItem.innerHTML = `${language}`
        document.querySelector('.language').appendChild(liItem)
    }

    function appendOptiLang(language) {
        const liItem = document.createElement('li');
        liItem.appendChild(document.createTextNode(language));
        document.querySelector('.language').appendChild(liItem)
    }
    appendOptiLang("Kotlin")
    appendOptiLang("Ocaml")

    // Edit
    const anotherLang = document.querySelector('li:nth-child(2)')
    const newLi = document.createElement('li')
    newLi.textContent = "C-Sharp"
    anotherLang.replaceWith(newLi)

    //edit
    const firstLang = document.querySelector('li:first-child')
    firstLang.outerHTML = '<li>Typescript</li>'

    //removal
    document.querySelector('li:last-child').remove()
    
</script>
</html>
